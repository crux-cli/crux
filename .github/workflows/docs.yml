name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "src/crux_cli/**"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to deploy (e.g., 1.0.1). If set, deploys as this version + latest. If empty, deploys as dev."
        required: false
        type: string

permissions:
  contents: write
  pages: write

jobs:
  deploy:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install \
            mkdocs-material \
            mkdocstrings[python] \
            mike

      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy versioned docs (release)
        if: github.event_name == 'release'
        env:
          TAG_REF: ${{ github.ref }}
        run: |
          VERSION=${TAG_REF#refs/tags/v}
          mike deploy --push --update-aliases "$VERSION" latest
          mike set-default --push latest

      - name: Deploy versioned docs (workflow_dispatch with version)
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        env:
          VERSION: ${{ inputs.version }}
        run: |
          mike deploy --push --update-aliases "$VERSION" latest
          mike set-default --push latest

      - name: Deploy dev docs (main branch)
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.version == '')
        run: |
          mike deploy --push --update-aliases dev
          # Set dev as default only until the first release creates 'latest'
          if ! mike list | grep -q latest; then
            mike set-default --push dev
          fi
