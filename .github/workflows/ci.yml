name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call: {}

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Validate — Python syntax
  # ---------------------------------------------------------------------------
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Python syntax (src/crux_cli/)
        run: |
          find src/crux_cli/ -name "*.py" -exec python3 -m py_compile {} \;

      - name: Check Python syntax (tests/)
        run: |
          find tests/ -name "*.py" -exec python3 -m py_compile {} \;

  # ---------------------------------------------------------------------------
  # Lint — ruff
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Run ruff linter
        run: uv run --with ruff ruff check src/crux_cli/ tests/ --output-format=github

      - name: Run ruff formatter check
        run: uv run --with ruff ruff format --check src/crux_cli/ tests/
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Security — dependency audit + secret scanning
  # ---------------------------------------------------------------------------
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Audit dependencies for known vulnerabilities
        run: uv pip audit
        continue-on-error: true

      # Secret scanning handled by GitHub's built-in secret scanning + push protection
      # (enabled at repo level — blocks pushes containing detected secrets)

  # ---------------------------------------------------------------------------
  # Unit tests — matrix across OS + Python versions
  # ---------------------------------------------------------------------------
  unit-tests:
    name: "Unit Tests (py${{ matrix.python-version }}, ${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    needs: [validate, lint]
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Run unit tests with coverage
        run: |
          uv run pytest tests/unit/ \
            --cov=crux_cli \
            --cov-report=xml:coverage-unit.xml \
            --cov-report=term-missing \
            -v \
            --tb=short \
            -m "not slow"

      - name: Upload unit test coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        with:
          file: coverage-unit.xml
          flags: unit
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Integration tests — matrix across OS + Python versions
  # ---------------------------------------------------------------------------
  integration-tests:
    name: "Integration Tests (py${{ matrix.python-version }}, ${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    needs: [validate, lint]
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install Node.js (needed for npx in tests)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Run integration tests with coverage
        run: |
          uv run pytest tests/integration/ \
            --cov=crux_cli \
            --cov-report=xml:coverage-integration.xml \
            --cov-report=term-missing \
            -v \
            --tb=short \
            -m "not slow"

      - name: Upload integration test coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        with:
          file: coverage-integration.xml
          flags: integration
          fail_ci_if_error: false
